<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>

    <form id="add-form">
      <input
        type="text"
        id="new-title"
        placeholder="What needs to be done?"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <p id="empty-msg" class="empty-msg hidden">No tasks yet. Add one above!</p>
    <p id="error-msg" class="error-msg hidden"></p>
  </div>

  <script>
    const API = "/tasks";

    const taskList  = document.getElementById("task-list");
    const emptyMsg  = document.getElementById("empty-msg");
    const errorMsg  = document.getElementById("error-msg");
    const addForm   = document.getElementById("add-form");
    const newTitle  = document.getElementById("new-title");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove("hidden");
      setTimeout(() => errorMsg.classList.add("hidden"), 4000);
    }

    function renderTasks(tasks) {
      taskList.innerHTML = "";
      emptyMsg.classList.toggle("hidden", tasks.length > 0);

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.className = "task-item" + (task.completed ? " completed" : "");
        li.dataset.id = task._id;

        li.innerHTML = `
          <label class="checkbox-label">
            <input type="checkbox" class="toggle-cb" ${task.completed ? "checked" : ""} />
            <span class="title-text">${escapeHtml(task.title)}</span>
          </label>
          <div class="actions">
            <button class="btn-edit" title="Edit">&#9998;</button>
            <button class="btn-delete" title="Delete">&#10005;</button>
          </div>
        `;

        // Toggle completed
        li.querySelector(".toggle-cb").addEventListener("change", () => toggleTask(li.dataset.id, !task.completed));

        // Delete
        li.querySelector(".btn-delete").addEventListener("click", () => deleteTask(li.dataset.id));

        // Edit
        li.querySelector(".btn-edit").addEventListener("click", () => startEdit(li, task));

        taskList.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function loadTasks() {
      try {
        const res  = await fetch(API);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load tasks");
        renderTasks(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function createTask(title) {
      const res  = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to create task");
      return data.data;
    }

    async function toggleTask(id, completed) {
      const res  = await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ completed }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to update task");
      loadTasks();
    }

    async function deleteTask(id) {
      const res  = await fetch(`${API}/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to delete task");
      loadTasks();
    }

    async function saveEdit(id, newTitleValue, li) {
      try {
        const res  = await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: newTitleValue }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to update task");
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    function startEdit(li, task) {
      const label = li.querySelector(".checkbox-label");
      const titleSpan = li.querySelector(".title-text");
      const editBtn = li.querySelector(".btn-edit");

      const input = document.createElement("input");
      input.type = "text";
      input.className = "edit-input";
      input.value = task.title;

      label.replaceChild(input, titleSpan);
      editBtn.textContent = "Save";
      input.focus();

      const finish = () => {
        const val = input.value.trim();
        if (val && val !== task.title) {
          saveEdit(li.dataset.id, val, li);
        } else {
          loadTasks(); // revert
        }
      };

      editBtn.onclick = finish;
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") finish();
        if (e.key === "Escape") loadTasks();
      });
    }

    addForm.addEventListener("submit", async e => {
      e.preventDefault();
      const title = newTitle.value.trim();
      if (!title) return;
      try {
        await createTask(title);
        newTitle.value = "";
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    });

    loadTasks();
  </script>
</body>
</html>
